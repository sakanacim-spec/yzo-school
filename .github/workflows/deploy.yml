name: Deploy — Production (Render)

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations Supabase
        run: |
          npx supabase db push --project-id ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Trigger Render Deploy (API)
        run: |
          curl -s -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK_API }}"
          echo "Deploy API triggered"

      - name: Trigger Render Deploy (Admin)
        run: |
          curl -s -X POST "${{ secrets.RENDER_ADMIN_DEPLOY_HOOK }}"
          echo "Deploy Admin triggered"
