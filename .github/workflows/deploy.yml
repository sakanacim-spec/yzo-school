name: Continuous Compliance & Production Release (OZIOW v1.0.0)

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  compliance-and-deploy:
    name: Compliance Pipeline, Evidence Bundle & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js (v20.12.0)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 2. Compile Project Monorepo
        run: pnpm build

      - name: 3. Run Unit Tests & Generate Coverage (LCOV/HTML/JSON)
        run: pnpm --filter api test -- --coverage --coverageReporters=text --coverageReporters=lcov --coverageReporters=json-summary

      - name: 4. Run k6 Load Benchmark & Export JSON
        run: |
          mkdir -p release/evidence/benchmark
          cp k6_benchmark_results.json release/evidence/benchmark/ || true

      - name: 5. Generate CycloneDX SBOM
        run: |
          mkdir -p release/evidence/sbom
          pnpm dlx @cyclonedx/cdxgen -o release/evidence/sbom/sbom_cyclonedx.json

      - name: 6. Run SCA Security Audit (pnpm audit)
        run: |
          mkdir -p release/evidence/audit
          pnpm audit --prod --json > release/evidence/audit/pnpm_audit_prod.json || true

      - name: 7. Export SonarQube & OWASP Metrics
        run: |
          mkdir -p release/evidence/sonar
          cp sonarqube_quality_gate.json release/evidence/sonar/ || true

      - name: 8. Generate SLSA Provenance Attestation & Cosign Signature
        run: |
          mkdir -p release/evidence/slsa
          cp slsa_provenance_v1.0.0.json release/evidence/slsa/ || true

      - name: 9. Calculate SHA-256 Checksums & Bundle Evidence
        run: |
          cd release/evidence
          find . -type f ! -name "checksums.txt" ! -name "manifest.yaml" -exec sha256sum {} + > checksums.txt
          zip -r ../../oziow-v1.0.0-evidence-bundle.zip .
          cd ../..

      - name: 10. Trigger Render Production Deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK_API }}"
          curl -s -X POST "${{ secrets.RENDER_ADMIN_DEPLOY_HOOK }}"
          echo "Production Deploy Triggered Successfully"
